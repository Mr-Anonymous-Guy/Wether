<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e6bff"/>
      <stop offset="30%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#fde047"/>
      <stop offset="80%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="70%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </radialGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dy="3" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <ellipse cx="140" cy="120" rx="220" ry="110" fill="#ffffff" opacity="0.18"/>
    <ellipse cx="420" cy="440" rx="200" ry="120" fill="#000000" opacity="0.08"/>

    <!-- Sun behind cloud upper-right -->
    <circle cx="360" cy="180" r="62" fill="url(#sun)" filter="url(#glass)"/>

    <!-- Cloud -->
    <g filter="url(#shadow)">
      <path fill="url(#cloud)" d="
        M 150 290
        C 110 290, 100 240, 140 226
        C 140 180, 200 160, 232 188
        C 254 156, 312 158, 326 200
        C 368 196, 396 230, 384 264
        C 408 276, 404 312, 372 314
        L 162 314
        C 138 314, 130 300, 150 290 Z"/>
    </g>

    <!-- Raindrops -->
    <g fill="url(#drop)" filter="url(#glass)">
      <path d="M 180 340 q -14 22 0 34 q 14 -12 0 -34 Z"/>
      <path d="M 232 348 q -14 22 0 34 q 14 -12 0 -34 Z"/>
      <path d="M 284 340 q -14 22 0 34 q 14 -12 0 -34 Z"/>
      <path d="M 336 348 q -14 22 0 34 q 14 -12 0 -34 Z"/>
    </g>

    <!-- Ring badge top-right -->
    <g filter="url(#glass)">
      <circle cx="430" cy="82" r="22" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.95"/>
      <circle cx="430" cy="82" r="22" fill="#ffffff" opacity="0.08"/>
    </g>

    <!-- Glass highlight -->
    <path d="M 0 0 H 512 V 180 Q 256 240 0 180 Z" fill="#ffffff" opacity="0.08"/>
  </g>
</svg>
